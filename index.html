<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driller Puzzle Prototype (Phaser)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>

<body>
  <main class="app">
    <span id="levelText" class="pill" hidden>Level 1/1</span>
    <button id="nextLevelBtn" class="btn" type="button">Next Level</button>
    <button id="restartBtn" class="btn" type="button" hidden>Restart</button>
    <span id="tilesRemaining" class="pill" hidden>Tiles: --</span>
    <span id="poolHint" class="pill" hidden>Top row + tray deployable</span>
    <div id="statusText" class="status" aria-live="polite" hidden>Ready</div>

    <section class="card game-card">
      <div id="gameRoot" aria-label="Phaser game canvas"></div>
      <div id="resultOverlay" class="result-overlay" hidden>
        <div class="result-popup" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
          <img id="resultImage" class="result-image" alt="" />
          <div class="result-banner-wrap">
            <img id="resultBanner" class="result-banner" alt="" />
            <span id="resultTitle" class="result-title"></span>
          </div>
          <div class="result-btn-row">
            <button id="resultRetryBtn" class="result-btn" type="button" aria-label="Retry level">
              <img class="result-btn-bg" src="assets/UI/retry_button.png" alt="" />
              <span class="result-btn-label">Retry</span>
            </button>
            <button id="resultNextBtn" class="result-btn" type="button" aria-label="Next level">
              <img class="result-btn-bg" src="assets/UI/next_button.png" alt="" />
              <span class="result-btn-label">Next</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
